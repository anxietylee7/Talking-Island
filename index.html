<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI 동물 주민 동네</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div id="app"></div>
<div id="canvas-container"></div>

<div id="intro-screen">
  <div class="intro-logo">🏘️</div>
  <div class="intro-title">AI 동물 주민 동네</div>
  <div class="intro-subtitle">첫 주민을 뽑고 함께 살아갈 동네를 시작해보세요</div>
  
  <div class="gacha-box">
    <div class="gacha-capsule" id="gacha-capsule">🎁</div>
    <div id="gacha-progress" style="font-size:12px; color:#9c7a5a; margin-bottom:10px">주민 <b id="gacha-count">0</b> / 5명 뽑기</div>
    <button id="intro-gacha-btn" onclick="window.__introRollGacha && window.__introRollGacha()">🎲 주민 뽑기</button>
    <div class="intro-loading" id="intro-loading">
      <div class="spinner"></div>
      <span>새 주민을 부르는 중...</span>
    </div>
    
    <div class="gacha-result" id="gacha-result">
      <div class="result-name" id="result-name"></div>
      <div class="result-species" id="result-species"></div>
      <div class="result-detail">
        <div class="label">직업</div><div class="value" id="result-job"></div>
        <div class="label">꿈</div><div class="value" id="result-dream"></div>
        <div class="label">성격</div><div class="value" id="result-personality"></div>
        <div class="label">말버릇</div><div class="value" id="result-speech"></div>
      </div>
      <div id="gacha-result-actions"></div>
    </div>
  </div>
</div>

<div id="top-bar" class="panel">
  <div class="title">🏘️ AI 동물 주민 동네</div>
  <div class="stats">
    <div class="badge badge-mint" id="day-badge">Day 1 · ☀️ 아침</div>
    <div id="time-bar"><div id="time-bar-fill" style="width: 20%"></div></div>
    <div class="badge badge-mint" id="npc-count">주민 0명</div>
    <div class="badge badge-peach" id="quest-count" style="display:none">퀘스트 0건</div>
  </div>
</div>

<!-- [9단계] 퀘스트 배너 — 엔진의 getCurrentBannerText 가 제공하는 텍스트를
     화면 상단에 표시. 스테이지/마일스톤에 따라 내용이 바뀜. 빈 텍스트면 숨김. -->
<div id="quest-banner" style="display:none">
  <span class="banner-text"></span>
  <span class="banner-progress"></span>
</div>

<div id="left-panel" class="panel">
  <div style="margin-bottom:10px">
    <div class="section-title">🐾 주민들</div>
  </div>
  <div id="npc-list"></div>
  <button class="btn btn-night" id="night-btn">🌙 밤으로 → 다음 날</button>
</div>

<div id="right-panel" class="panel">
  <div class="tab-bar">
    <button data-tab="chat" class="active">💬 대화</button>
    <button data-tab="report">📜 리포트</button>
    <button data-tab="board">📢 소문</button>
    <button data-tab="quest">📖 퀘스트<span class="dot" id="quest-dot" style="display:none"></span></button>
  </div>
  <div class="content-area" id="tab-content"></div>
</div>

<div id="notification"></div>

<!-- [8단계] 이미지 업로드 UI 제거됨. 유저는 이 버튼 및 모달에 접근 불가.
     내부 assetRegistry / ASSET_SLOTS / ASSET_META 는 유지되어 증거 팝업 등에서 정상 사용. -->

<div id="story-modal">
  <div class="story-modal-inner">
    <div class="story-modal-title" id="story-modal-title"></div>
    <div class="story-modal-body" id="story-modal-body"></div>
    <button class="story-modal-close" onclick="window.__closeStoryModal && window.__closeStoryModal()">확인</button>
  </div>
</div>

<!-- 제타 스타일 채팅 -->
<div id="zeta-chat">
  <div class="zeta-inner">
    <div class="zeta-header">
      <button class="zeta-back" onclick="window.__closeZeta && window.__closeZeta()">←</button>
      <div class="zeta-header-info">
        <div class="zeta-header-name" id="zeta-name"></div>
        <div class="zeta-header-sub" id="zeta-sub"></div>
      </div>
      <div class="zeta-heart">♥ <span id="zeta-affinity"></span></div>
    </div>
    <div class="zeta-chat-area">
      <div class="zeta-messages" id="zeta-messages"></div>
      <div class="zeta-input-row">
        <input type="text" class="zeta-input" id="zeta-input" placeholder="메시지를 입력하세요..." />
        <button class="zeta-send" id="zeta-send" onclick="window.__zetaSend && window.__zetaSend()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- 증거 팝업 -->
<div id="evidence-modal" onclick="window.__closeEvidence && window.__closeEvidence()">
  <div class="evidence-inner" onclick="event.stopPropagation()">
    <div class="evidence-img-wrap">
      <img id="evidence-img" />
    </div>
    <div class="evidence-context" id="evidence-context"></div>
    <div class="evidence-hint">클릭하여 닫기</div>
  </div>
</div>

<!-- [8단계] 이미지 업로드 모달 제거됨 (유저 접근 차단). state.js 의 openAssets/closeAssets
     함수 및 asset-modal 관련 로직은 호출처가 없어져 사문화됨 (삭제는 9단계 정리 부채). -->

<div id="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loading-msg">불러오는 중...</div>
  </div>
</div>

<div id="hint">🖱️ 바닥 클릭: 이동 · NPC 클릭: 다가가서 대화 · 드래그: 카메라 · 휠: 줌</div>

<button id="exit-interior">← 동네로 나가기</button>
<div id="interior-title"><span id="interior-emoji">🍞</span><span id="interior-name">빵집</span></div>


<!-- 외부 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GLTFLoader (캐릭터 GLB/GLTF 로드용) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<!-- SkeletonUtils (SkinnedMesh clone용 — r128 clone 버그 우회) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
<!-- 미리 로드된 이미지 에셋 (base64) -->
<script src="assets.js"></script>

<!-- 게임 스크립트 — 로드 순서 중요 -->
<script src="scripts/data.js"></script>
<script src="scripts/scenarios/bookstore.js"></script>
<script src="scripts/scenarioEngine.js"></script>
<script src="scripts/state.js"></script>
<script src="scripts/scene.js"></script>
<script src="scripts/gameplay.js"></script>
<script src="scripts/main.js"></script>

</body>
</html>
